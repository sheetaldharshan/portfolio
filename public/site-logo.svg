<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="site-logo-gradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6" />
      <stop offset="0.4" stop-color="#D946EF" />
      <stop offset="1" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="site-logo-glow" x="-50" y="-50" width="200" height="200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix" />
      <feBlend in="SourceGraphic" in2="BackgroundImageFix" mode="normal" result="shape" />
      <feGaussianBlur stdDeviation="4" result="effect1_foregroundBlur_1" />
      <feColorMatrix
        in="effect1_foregroundBlur_1"
        type="matrix"
        values="0 0 0 0 0.5 0 0 0 0 0.2 0 0 0 0 0.9 0 0 0 0.6 0"
      />
      <feBlend in="shape" in2="effect1_foregroundBlur_1" mode="normal" result="effect2_innerShadow_1" />
    </filter>
  </defs>

  <circle cx="50" cy="50" r="48" stroke="url(#site-logo-gradient)" stroke-width="0.5" stroke-dasharray="2 6" opacity="0.3" />

  <g filter="url(#site-logo-glow)">
    <path
      d="M45 25L20 35V45L45 55V65L20 75"
      stroke="url(#site-logo-gradient)"
      stroke-width="8"
      stroke-linecap="square"
    />
    <path
      d="M55 25V75L85 60V40Z"
      stroke="url(#site-logo-gradient)"
      stroke-width="8"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />
  </g>

  <path d="M50 40L60 50L50 60L40 50Z" fill="url(#site-logo-gradient)" fill-opacity="0.2" />
  <circle cx="50" cy="50" r="2" fill="white" />
</svg>
